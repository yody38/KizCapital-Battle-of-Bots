<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Acceso · Kiz Capital LLC</title>
<link rel="stylesheet" href="/login.css?v=20260513a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>
<div class="aurora aurora-3"></div>
<div class="grid-overlay"></div>

<main class="login-shell">
  <section class="login-card" aria-live="polite">
    <header class="login-header">
      <div class="brand-chip">Kiz Capital LLC</div>
      <h1 class="login-title" id="login-title">Acceso al portfolio</h1>
      <p class="login-sub" id="login-sub">Ingresa tu correo para recibir un código de un solo uso.</p>
    </header>

    <!-- STEP 1 — Email -->
    <form id="step-email" class="login-form" autocomplete="on">
      <label class="field">
        <span class="field-label">Email</span>
        <input
          id="email-input"
          name="email"
          type="email"
          inputmode="email"
          autocomplete="email"
          required
          placeholder="tu@ejemplo.com"
        />
      </label>
      <button type="submit" class="primary-btn" id="email-submit">
        <span class="btn-label">Enviar código</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>
      <p class="login-error" id="email-error" hidden></p>
    </form>

    <!-- STEP 2 — Code -->
    <form id="step-code" class="login-form" hidden autocomplete="off">
      <p class="code-sent" id="code-sent">
        Enviamos un código a <strong id="code-target">tu@ejemplo.com</strong>.
      </p>
      <div class="otp-row" role="group" aria-label="Código de 6 dígitos">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" data-i="0" autocomplete="one-time-code">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" data-i="1">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" data-i="2">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" data-i="3">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" data-i="4">
        <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" data-i="5">
      </div>
      <button type="submit" class="primary-btn" id="code-submit">
        <span class="btn-label">Verificar</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>
      <div class="meta-row">
        <button type="button" class="link-btn" id="resend-btn">Reenviar código</button>
        <span class="dot-sep">·</span>
        <button type="button" class="link-btn" id="change-email-btn">Cambiar email</button>
      </div>
      <p class="login-error" id="code-error" hidden></p>
    </form>
  </section>

  <footer class="login-foot">
    Kiz Capital LLC · Battle of Bots
  </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.46.1/dist/umd/supabase.min.js"></script>
<script src="/config.js"></script>
<script src="/supabase-client.js?v=20260513a"></script>
<script src="/login.js?v=20260513a"></script>
</body>
</html>
