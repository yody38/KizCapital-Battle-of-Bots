name: mcp-health

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [mcp-health]

permissions:
  contents: read
  issues: write

concurrency:
  group: mcp-health
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci

      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Restore mcp-health state
        uses: actions/cache/restore@v4
        with:
          path: data/mcp_health_state.json
          key: mcp-health-state-${{ github.run_id }}
          restore-keys: |
            mcp-health-state-

      - name: Probe MCP health
        env:
          SSH_KEY: /home/runner/.ssh/id_ed25519_ci
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_RECOVERY: "0"
        run: python3 scripts/mcp_health.py

      - name: Save mcp-health state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/mcp_health_state.json
          key: mcp-health-state-${{ github.run_id }}

      - name: Upload health artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-health-${{ github.run_id }}
          path: |
            data/mcp_health.json
            data/mcp_health_state.json
          if-no-files-found: warn
          retention-days: 7
