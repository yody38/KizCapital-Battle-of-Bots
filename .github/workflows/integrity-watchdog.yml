name: integrity-watchdog

on:
  schedule:
    - cron: "20,50 * * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [integrity-watchdog]

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: integrity-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Run integrity watchdog
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/integrity_watchdog.py

      - name: Upload health log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-health-log-${{ github.run_id }}
          path: data/integrity_health_log.jsonl
          if-no-files-found: warn
          retention-days: 7
