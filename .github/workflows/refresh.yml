name: refresh-dashboard

on:
  schedule:
    - cron: "10,40 * * * *"   # UTC; backup if external trigger misses
  workflow_dispatch: {}        # manual trigger button
  repository_dispatch:
    types: [refresh-dashboard] # external trigger (VPS1 cron via PAT)

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

permissions:
  contents: write   # ledger/roots.log notarization push (Fase D-sustituto)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONHASHSEED: "0"   # deterministic str hashing across processes (Data Integrity DNA)
      LEDGER_COMMIT: "1"    # mirror.sh notarizes the verified data root in git (CI only)

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci

      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Build .env.local
        run: |
          umask 077
          cat > .env.local <<EOF2
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF2

      - name: Ensure up-to-date CA bundle (certifi for Supabase TLS)
        run: python3 -m pip install --quiet --upgrade certifi

      - name: Restore upload manifest cache
        uses: actions/cache/restore@v4
        with:
          path: data/.upload-manifest.json
          key: upload-manifest-${{ github.run_id }}
          restore-keys: |
            upload-manifest-

      - name: Run mirror + post_merge + upload
        env:
          SSH_KEY: /home/runner/.ssh/id_ed25519_ci
        run: bash scripts/mirror.sh

      - name: Determinism gate (post_merge reproducible across processes)
        # Runs post_merge twice on the just-mirrored data and asserts byte-identical
        # output (minus wall-clock stamps). Catches any non-deterministic regression
        # (unseeded RNG, builtin hash() on str). Data already uploaded — this is a
        # red-flag alert, not a data gate. Cheap (~20s) relative to the cycle.
        if: success()
        run: python3 scripts/test_determinism.py data

      - name: Save upload manifest cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/.upload-manifest.json
          key: upload-manifest-${{ github.run_id }}

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mirror-logs-${{ github.run_id }}
          path: data/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload integrity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-report-${{ github.run_id }}
          path: data/integrity_report.json
          if-no-files-found: warn
          retention-days: 30
